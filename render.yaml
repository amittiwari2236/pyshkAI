databases:
  - name: pyshk-db
    databaseName: pyshk
    user: pyshk_user
    plan: free

services:
  - type: web
    name: pyshk-backend
    env: python
    buildCommand: "bash ./build.sh"
    startCommand: "cd backend && gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pyshk-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: pyshk-frontend
    env: static
    buildCommand: ""
    staticPublishPath: "./frontend"
